name: "CI"

on:
  push:
    branches:
      - "main"
      - "master"
  pull_request:
    branches:
      - "main"
      - "master"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache

jobs:
  # --------------------------------------------------------------------
  # P1: Fast pre-merge checks (no special hardware)
  # --------------------------------------------------------------------

  commit-check:
    name: commit message check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install commitizen
        run: pip install commitizen
      - name: Check last commit message
        run: cz check --rev-range HEAD~1..HEAD

  version-consistency-check:
    name: version consistency check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Check Rust and Python package versions stay in sync
        run: |
          python3 - <<'PY'
          import pathlib
          import re

          repo = pathlib.Path.cwd()
          cargo_toml = (repo / "Cargo.toml").read_text(encoding="utf-8")
          pyproject_toml = (repo / "python" / "pyproject.toml").read_text(encoding="utf-8")

          def find_section_version(text: str, section: str) -> str:
              match = re.search(
                  rf"(?ms)^\[{re.escape(section)}\]\n(.*?)(?:^\[|\Z)",
                  text,
              )
              if match is None:
                  raise SystemExit(f"missing section [{section}]")

              version_match = re.search(
                  r'^version = "([^"]+)"$',
                  match.group(1),
                  re.MULTILINE,
              )
              if version_match is None:
                  raise SystemExit(f"missing version in [{section}]")
              return version_match.group(1)

          rust_version = find_section_version(cargo_toml, "workspace.package")
          python_version = find_section_version(pyproject_toml, "project")
          commitizen_version = find_section_version(pyproject_toml, "tool.commitizen")

          if rust_version != python_version or python_version != commitizen_version:
              raise SystemExit(
                  "version mismatch: "
                  f"Cargo.toml={rust_version}, "
                  f"python/pyproject.toml project={python_version}, "
                  f"tool.commitizen={commitizen_version}"
              )

          print(f"version check passed: {rust_version}")
          PY

  typos-check:
    name: typos check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Run typos check
        uses: crate-ci/typos@master

  rust-fmt-check:
    name: rust fmt check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: rustfmt
      - name: Run rust format check
        run: |
          cargo fmt --all -- --check

  rust-clippy-check:
    name: rust clippy check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install protobuf compiler and RDMA headers
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libibverbs-dev
      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: clippy
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Run rust clippy check
        run: |
          cargo clippy --workspace --exclude pegaflow-py --all-targets -- -D warnings

  ruff-check:
    name: ruff check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Run ruff check
        uses: astral-sh/ruff-action@v3

  python-unit-tests:
    name: python unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install uv
        run: pip install uv
      - name: Run default Python test gate
        working-directory: python
        run: |
          uv run --isolated --no-project --with pytest --with numpy --with 'requests>=2.26.0' pytest

  # --------------------------------------------------------------------
  # P2: Ascend compile check (this project targets Ascend NPU only)
  # --------------------------------------------------------------------

  cargo-check-ascend:
    name: cargo check (ascend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install protobuf compiler and RDMA headers
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libibverbs-dev
      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@1.97.0
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Run cargo check
        run: |
          cargo check --no-default-features --features ascend -p pegaflow-core
          cargo check --no-default-features --features ascend -p pegaflow-server --all-targets
        env:
          CUDA_PATH: /usr/local/cuda

  cargo-check:
    name: cargo check
    if: always()
    needs: cargo-check-ascend
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.cargo-check-ascend.result }}" != "success" ]]; then
            echo "cargo check (ascend) failed"
            exit 1
          fi
